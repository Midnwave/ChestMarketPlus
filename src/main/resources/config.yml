# do not change this manually
config-version: 1

# shown before all plugin messages, supports MiniMessage
prefix: "<gray>[<gold>ChestMarket+<gray>] "

# language file to use (from locale/ folder without .yml)
language: en_US

# words players can write on line 1 of a sign to create a shop (case insensitive)
shop-creation-trigger-words:
  - "[ChestMarket]"
  - "[ChestShop]"
  - "[Shop]"
  - "[CM]"
  - "[CM+]"
  - "[Market]"
  - "[Buy]"
  - "[Sell]"

economy:
  use-vault: true
  starting-balance: 0.0
  currency-symbol: "$"
  currency-name: "dollars"
  # 0 1 or 2
  decimal-places: 2

shops:
  # override per player with chestmarket.limit.<number> permission
  default-max-shops: 10
  # 0 means free
  creation-fee: 100.0
  # percent taken from each transaction, 0 means no tax
  tax-rate: 5.0
  global-min-price: 0.01
  global-max-price: 1000000.0

expiry:
  enabled: true
  duration-days: 30
  warn-days-before: 3
  # if false the shop is just deactivated instead of deleted
  auto-delete-expired: false

display:
  enabled: true
  render-distance: 16
  # degrees per tick, 0 disables rotation
  item-rotation-speed: 10.0
  # ticks between scroll steps, 0 disables scrolling
  scrolling-text-speed: 13
  out-of-stock-text: "<red><bold>OUT OF STOCK"

signs:
  auto-color: true
  # if true players must be crouching to create a shop via sign
  require-crouch: false
  buy-color: "<green>"
  sell-color: "<red>"
  both-color: "<yellow>"

items:
  blacklist:
    - "BEDROCK"
    - "BARRIER"
    - "COMMAND_BLOCK"
    - "COMMAND_BLOCK_MINECART"
    - "CHAIN_COMMAND_BLOCK"
    - "REPEATING_COMMAND_BLOCK"
    - "STRUCTURE_BLOCK"
    - "STRUCTURE_VOID"
    - "JIGSAW"
    - "DEBUG_STICK"
  blacklist-bypass-permission: "chestmarket.bypass.blacklist"
  whitelist:
    enabled: false
    # blacklist blocks listed items, whitelist only allows listed items
    mode: "blacklist"

protection:
  chest-protection: true
  admin-bypass-permission: "chestmarket.admin.bypass"
  # Allow non-owners to sneak+right-click a shop chest/sign to view its contents (read-only)
  allow-chest-peek: false

worldguard:
  enabled: true
  flag-name: "chest-shop"
  # true means shops are allowed globally by default
  default-value: true

worlds:
  # blacklist blocks listed worlds, whitelist only allows listed worlds
  mode: "blacklist"
  list: []

notifications:
  default-enabled: true
  sound:
    buy: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sell: "ENTITY_VILLAGER_YES"
  particles:
    transaction-burst: true
    particle-type: "VILLAGER_HAPPY"
    count: 15

ratings:
  enabled: true
  # on or off
  mode: "on"

discord:
  webhook-url: ""
  admin-events: true

update-checker:
  enabled: true
  notify-in-game: true

bstats:
  enabled: true
