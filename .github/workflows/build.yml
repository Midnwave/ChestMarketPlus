name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'releases/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: build jar
        run: ./gradlew build --no-daemon

      - name: publish dev build
        run: |
          mkdir -p releases
          cp build/libs/ChestMarketPlus-*.jar "releases/ChestMarketPlusDev${{ github.run_number }}.jar"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/
          git diff --staged --quiet || git commit -m "build: dev ${{ github.run_number }}" && git push
